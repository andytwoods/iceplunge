build_settings:
  build_image: dockerfile
  dockerfile_path: Dockerfile
  dockerfile_context_path: ""
  container_port: 8000
  environment_variables:
    - name: DATABASE_URL
      from_database:
        name: postgres
        property: private_connection_url
    - name: REDIS_URL
      from_database:
        name: redis
        property: private_connection_url
    - name: DJANGO_SECRET_KEY
    - name: DJANGO_ADMIN_URL
    - name: ROLLBAR_ACCESS_TOKEN

services:
  web:
    scale: 1
    command: bash run.sh
  huey:
    scale: 1
    command: python manage.py run_huey
  release:
    command: bash release.sh

databases:
  redis:
    type: redis_8
  postgres:
    type: postgresql_18
